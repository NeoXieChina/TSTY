name: Flutter iOS Build and Test

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build-and-test:
    name: Build and Test Flutter iOS App
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable' # 或 'beta', 'dev' 等

      - name: Install dependencies
        run: flutter pub get

      #   - name: Run Flutter unit/widget tests
      #     run: flutter test

      - name: Accept Xcode licenses (required for iOS builds)
        run: |
          sudo xcodebuild -license accept

      - name: Build iOS app (for simulator)
        run: |
          flutter build ios --simulator --no-codesign
        env:
          # 避免因未配置签名而失败
          FLUTTER_BUILD_MODE: debug

      # 可选：运行集成测试（需要模拟器）
      # 注意：GitHub Actions 的 macOS runner 默认不启动模拟器，
      # 所以通常只做 build，不做真机/模拟器 UI 测试，除非额外配置。
      - name: Upload iOS Simulator App
        uses: actions/upload-artifact@v4
        with:
          name: Runner.app
          path: build/ios/iphonesimulator/Runner.app